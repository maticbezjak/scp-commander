# Flatpak manifest for the GTK app. Build on a Linux machine with
# flatpak-builder and the GNOME 46 SDK installed:
#
#   flatpak install org.gnome.Platform//46 org.gnome.Sdk//46 \
#       org.freedesktop.Sdk.Extension.rust-stable//23.08
#   flatpak-builder --user --install build-dir packaging/flatpak/net.manto.ScpCommander.yml
#
# Note: flatpak builds run offline; vendor the cargo deps first
# (cargo vendor + a generated cargo-sources.json) or build with
# --share=network for a local development build.
app-id: net.manto.ScpCommander
runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: scp-commander
finish-args:
  - --share=network          # talks to SFTP/FTP/S3 servers
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home        # local pane browses the home directory
  - --talk-name=org.freedesktop.secrets  # password storage
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
modules:
  - name: libssh2
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DCRYPTO_BACKEND=OpenSSL
    sources:
      - type: archive
        url: https://libssh2.org/download/libssh2-1.11.1.tar.gz
        sha256: d9ec76cbe34db98eec3539fe2c899d26b0c837cb3eb466a56b0f109cabf658f7

  - name: scp-commander
    buildsystem: simple
    build-commands:
      - cargo build -p scp-ubuntu --release --features scp-core/s3 --offline
      - install -Dm755 target/release/scp-ubuntu /app/bin/scp-commander
      - install -Dm644 packaging/scp-commander.desktop
        /app/share/applications/net.manto.ScpCommander.desktop
    sources:
      - type: dir
        path: ../..
