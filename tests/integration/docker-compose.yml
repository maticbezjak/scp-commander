# Throwaway servers for the integration suite (scripts/integration-test.sh).
# Credentials are deliberately trivial — these listen on localhost only.
services:
  sftp:
    image: atmoz/sftp
    command: "demo:demopass:::upload"
    ports:
      - "127.0.0.1:2222:22"

  # Full SSH server used to smoke-test exec_command.
  # atmoz/sftp forces ForceCommand internal-sftp so it can't run arbitrary commands.
  ssh:
    image: lscr.io/linuxserver/openssh-server
    environment:
      PUID: "1000"
      PGID: "1000"
      PASSWORD_ACCESS: "true"
      USER_NAME: "demo"
      USER_PASSWORD: "demopass"
    volumes:
      # Enable TCP forwarding so the jump-host test can tunnel through this
      # bastion (see enable-forwarding.sh).
      - ./enable-forwarding.sh:/custom-cont-init.d/99-enable-forwarding:ro
    ports:
      - "127.0.0.1:2223:2222"

  ftp:
    image: delfer/alpine-ftp-server
    environment:
      USERS: "demo|demopass|/ftp/demo"
      # Advertise localhost in PASV replies — otherwise clients are told the
      # container-internal IP and data connections hang.
      ADDRESS: "127.0.0.1"
      MIN_PORT: "21000"
      MAX_PORT: "21010"
    ports:
      - "127.0.0.1:2121:21"
      - "127.0.0.1:21000-21010:21000-21010"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: demo
      MINIO_ROOT_PASSWORD: demopass123
    ports:
      - "127.0.0.1:9000:9000"

  # One-shot bucket creation for the S3 tests.
  mc:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 demo demopass123; do sleep 1; done;
      mc mb -p local/test;
      exit 0"
