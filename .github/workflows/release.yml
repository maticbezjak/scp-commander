name: Release

# Triggered by pushing a version tag: git tag v1.2.3 && git push --tags
# Builds the Tauri app on each OS and attaches the installers to a GitHub
# Release. (The legacy SwiftUI/GTK bundles were retired; see the
# archive/native-apps branch.)
on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14 # Apple Silicon
          - platform: ubuntu-24.04
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config \
            libssl-dev libssh2-1-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: macOS system dependencies
        if: matrix.platform == 'macos-14'
        run: brew install libssh2 openssl@3 pkg-config

      # libssh2 builds against vendored OpenSSL on Windows (needs NASM).
      - uses: ilammy/setup-nasm@v1
        if: matrix.platform == 'windows-latest'

      - name: Install frontend deps
        run: npm --prefix ui-tauri ci

      # Builds the frontend (beforeBuildCommand) + the app, then creates/updates
      # the GitHub Release and uploads the platform installers.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ui-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "SCP Commander ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
