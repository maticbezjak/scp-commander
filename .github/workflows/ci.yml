name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  linux:
    name: Linux (core + GTK + integration)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev build-essential pkg-config \
            libssl-dev libssh2-1-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace (core + GTK app + Tauri app, with S3)
        run: cargo build --workspace --features scp-core/s3
      - name: Unit tests
        run: cargo test --workspace --features scp-core/s3
      - name: Integration tests (Docker servers)
        run: ./scripts/integration-test.sh

  macos:
    name: macOS (core + SwiftUI app)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      # Pin Xcode: the runner's newest Xcode defaults to Swift 6 strict
      # concurrency, which the SwiftUI app isn't ported to yet. 15.4 matches
      # the supported local toolchain.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"
      - name: System dependencies
        run: brew install libssh2 openssl@3 pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Core build + tests (with S3)
        run: |
          cargo build -p scp-core --features s3
          cargo test -p scp-core --features s3
      - name: SwiftUI app
        run: cd ui-macos && swift build
      - name: Tauri app
        run: cargo build -p scp-tauri

  windows:
    name: Windows (Tauri app)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # libssh2 builds against vendored OpenSSL on Windows, which needs NASM
      # (Perl ships with the runner).
      - uses: ilammy/setup-nasm@v1
      - name: Build Tauri app (release)
        run: cargo build -p scp-tauri --release
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: scp-commander-windows
          path: target/release/scp-tauri.exe
          if-no-files-found: error
